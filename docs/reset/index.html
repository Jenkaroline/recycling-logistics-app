<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Redefinir senha — Fallback</title>
    <style>
      body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; background: #f4f8fc; color:#102a40; display:flex; align-items:center; justify-content:center; height:100vh; margin:0 }
      .card { max-width:520px; width:100%; background:#fff; padding:24px; border-radius:12px; box-shadow:0 6px 22px rgba(0,0,0,0.12); }
      .actions { margin-top:16px; display:flex; gap:8px; }
      a.button, button.button { display:inline-block; padding:10px 14px; background:#36a3ff; color:#032746; text-decoration:none; border-radius:8px; border:0; cursor:pointer }
      pre { background:#f0f6fb; padding:10px; border-radius:6px; overflow:auto }
      label { display:block; margin-top:12px }
      input[type=password] { width:100%; padding:10px; margin-top:6px; box-sizing:border-box }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Redefinir senha</h2>
      <p>Se o app não abrir automaticamente, use este formulário para alterar sua senha.</p>
      <div id="info"></div>

      <div id="resetForm" style="display:none">
        <label>Nova senha
          <input id="newPassword" type="password" placeholder="Digite a nova senha" />
          <input id="confirmPassword" type="password" placeholder="Confirme a nova senha" />

        </label>
        <div class="actions">
          <button id="submitBtn" class="button">Confirmar nova senha</button>
        </div>
      </div>
<!--
      <h4 style="margin-top:16px">Código (oobCode)</h4>
      <pre id="code">—</pre>
-->
    </div>

    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
      import { getAuth, verifyPasswordResetCode, confirmPasswordReset } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';

      // Copie a configuração do Firebase que está em service/firebaseConfig.js
      const firebaseConfig = {
        apiKey: "AIzaSyD0UrjUQa8FTV6_68JGxPpiotzjXMN-P4A",
        authDomain: "recycling-logistics-app.firebaseapp.com",
        projectId: "recycling-logistics-app",
        storageBucket: "recycling-logistics-app.appspot.com",
        messagingSenderId: "600023019605",
        appId: "1:600023019605:android:d41327a559cd21488164dc",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      function getParam(name){ try{ const p = new URLSearchParams(location.search); return p.get(name); }catch(e){return null} }
      let oob = getParam('oobCode') || getParam('oobcode') || null;
      if(!oob){ const raw = location.href; const m = raw.match(/[?&]oobCode=([^&]+)/i) || raw.match(/oobCode=([^&]+)/i); if(m) oob = decodeURIComponent(m[1]); }

      const info = document.getElementById('info');
      const resetForm = document.getElementById('resetForm');
      const submitBtn = document.getElementById('submitBtn');
      const newPasswordInput = document.getElementById('newPassword');
      const confirmPasswordInput = document.getElementById('confirmPassword');

      if(oob){
        // Verifica o código e exibe email associado
        verifyPasswordResetCode(auth, oob)
          .then(email => {
            info.innerHTML = '<p><strong>Conta:</strong> ' + email + '</p>';
            resetForm.style.display = 'block';
          })
          .catch(err => {
            info.innerHTML = '<p style="color:#b00020">Erro ao processar o código: ' + (err.message||err.code) + '</p>';
          });

        submitBtn.addEventListener('click', ()=>{
          const newPassword = newPasswordInput.value.trim();
          const confirmPassword = confirmPasswordInput.value.trim();
          if(newPassword !== confirmPassword){
            alert('As senhas não coincidem.');
            return;
          }
          const isStrongPassword = (s) => /(?=.{8,})(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9])/.test(s);
          if(!isStrongPassword(newPassword)){
            alert('A senha deve ter pelo menos 8 caracteres, incluindo letra maiúscula, letra minúscula, número e caractere especial.');
            return;
          }
          submitBtn.disabled = true; submitBtn.textContent = 'Confirmando…';
          confirmPasswordReset(auth, oob, newPassword)
            .then(()=>{
              info.innerHTML = '<p style="color:green">Senha alterada com sucesso. Você já pode abrir o app ou fazer login no site.</p>';
              submitBtn.style.display = 'none';
              newPasswordInput.style.display = 'none';
              confirmPasswordInput.style.display = 'none';
            })
            .catch(err=>{
              alert('Erro ao confirmar senha: ' + (err.message||err.code));
            })
            .finally(()=>{ submitBtn.disabled = false; submitBtn.textContent = 'Confirmar nova senha'; });
        });

      } else {
        info.innerHTML = '<p><strong>Atenção:</strong> nenhum código de redefinição (oobCode) foi encontrado no link.</p>';
      }
    </script>
  </body>
</html>
