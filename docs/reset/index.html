<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Redirecionamento - Reset de senha</title>
    <style>
      body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; background: #f4f8fc; color:#102a40; display:flex; align-items:center; justify-content:center; height:100vh; margin:0 }
      .card { max-width:520px; width:100%; background:#fff; padding:24px; border-radius:12px; box-shadow:0 6px 22px rgba(0,0,0,0.12); }
      .actions { margin-top:16px; display:flex; gap:8px; }
      a.button { display:inline-block; padding:10px 14px; background:#36a3ff; color:#032746; text-decoration:none; border-radius:8px; }
      pre { background:#f0f6fb; padding:10px; border-radius:6px; overflow:auto }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Redirecionando para o app…</h2>
      <p>Se o app estiver instalado ele será aberto automaticamente. Caso contrário, copie o código ou abra manualmente.</p>
      <div id="info"></div>
      <div class="actions">
        <a id="openLink" class="button" href="#">Abrir no app</a>
      </div>
      <h4 style="margin-top:16px">Código recebido</h4>
      <pre id="code">—</pre>
    </div>

    <script>
      (function(){
        function getParam(name){
          try{ const p = new URLSearchParams(location.search); return p.get(name); }catch(e){return null}
        }
        // Firebase may generate links with oobCode as query param
        let oob = getParam('oobCode') || getParam('oobcode') || null;
        // also support links where code appears in fragment or path
        if(!oob){
          const raw = location.href;
          const m = raw.match(/[?&]oobCode=([^&]+)/i) || raw.match(/oobCode=([^&]+)/i);
          if(m) oob = decodeURIComponent(m[1]);
        }

        const info = document.getElementById('info');
        const codeEl = document.getElementById('code');
        const openLink = document.getElementById('openLink');

        if(oob){
          codeEl.textContent = oob;
          const deep = 'projetofaculdade://reset?oobCode=' + encodeURIComponent(oob);
          openLink.href = deep;
          openLink.textContent = 'Abrir app para redefinir';
          // try automatic redirect after short delay
          setTimeout(function(){ window.location.href = deep; }, 700);
        } else {
          info.innerHTML = '<p><strong>Atenção:</strong> nenhum código de redefinição (oobCode) foi encontrado no link.</p>';
          openLink.href = '#';
          openLink.textContent = 'Copiar link recebido';
          openLink.addEventListener('click', function(e){ e.preventDefault(); navigator.clipboard.writeText(location.href).then(function(){ alert('Link copiado'); }); });
          codeEl.textContent = location.href;
        }
      })();
    </script>
  </body>
</html>
